name: Release and Bump Homebrew

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m unittest discover -s tests -v

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  bump-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Compute sha256
        id: meta
        run: |
          VERSION="${GITHUB_REF##refs/tags/}"
          SHA256=$(
            curl -fsSL \
              "https://github.com/${{ github.repository }}/archive/refs/tags/${VERSION}.tar.gz" \
              | shasum -a 256 \
              | awk '{ print $1 }'
          )
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "Computed sha256 for ${VERSION}: ${SHA256}"

      - name: Dispatch formula bump to tap
        run: |
          gh workflow run bump-formula.yml \
            --repo rydersd/homebrew-tools \
            --ref main \
            --field version="${{ steps.meta.outputs.version }}" \
            --field sha256="${{ steps.meta.outputs.sha256 }}"
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
